name: 'Build Godot APK'
description: 'Export a Godot 4 project to Android APK'
author: 'justchrisdevmeow'

inputs:
  project-dir:
    description: 'Directory containing project.godot (default: workspace root)'
    required: false
    default: '.'
  preset:
    description: 'Android export preset name (must match preset in export_presets.cfg)'
    required: false
    default: 'Android'
  debug-mode:
    description: 'Export in debug mode (true/false)'
    required: false
    default: 'true'

runs:
  using: 'docker'
  image: 'Dockerfile'
  args:
    - 'bash'
    - '-c'
    - |
      set -e
      echo "Exporting in debug mode!" && \
      cd "${{ inputs.project-dir }}" && \
      mkdir -p /github/home/.local/share/godot/export_templates && \
      /usr/local/bin/godot --headless --export-${{ inputs.debug-mode == 'true' && 'debug' || 'release' }} "${{ inputs.preset }}" ./game.apk && \
      echo "APK built successfully" && \
      ls -la *.apk
